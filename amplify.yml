version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "🔍 Checking environment variables..."
        - echo "RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:+SET}" || echo "RAZORPAY_KEY_ID: NOT SET"
        - echo "RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:+SET}" || echo "RAZORPAY_KEY_SECRET: NOT SET"
        - echo "RAZORPAY_MODE: ${RAZORPAY_MODE:-NOT SET}"
        - npm install --legacy-peer-deps
    build:
      commands:
        - echo "🔧 Building with environment variables..."
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
